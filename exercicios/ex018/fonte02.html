<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Cloister';
            src: url('fonts/CloisterBlack.ttf') format(truetype);
            font-weight: normal;
            font-style: normal;
            /*
                Tipo de format():
                - opentype (otf)
                - truetype (ttf)
                - embedded-opentype
                - truetype-aat (Apple Advanced Typography)
                -svg
            */
        }
        @font-face {
            font-family: 'Hoshiko Satsuki';
            src: url('fonts/Hoshiko Satsuki.ttf') format(truetype);
            font-weight: normal;
            font-size: normal;
        }
        body{
            font-family: 'Hoshiko Satsuki', sans-serif;
        }
        h1{
            font-family: 'Cloister', Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ea iste, eius magni qui aliquam distinctio, ab ipsa autem consequatur eligendi dolorem alias aspernatur. Ipsam et molestiae quidem dolor maiores distinctio!</p>
</body>
</html>
